name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  integration:
    name: Integration (${{ matrix.backend }}${{ matrix.spark_version && format(' {0}', matrix.spark_version) || '' }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: spark
            spark_version: 3.4.4
            scala_binary: "2.12"
            java_version: "11"
            port: 15002
            test_data_dir: ${{ github.workspace }}/crates/teckel-spark/testdata
            experimental: false
          - backend: spark
            spark_version: 3.5.3
            scala_binary: "2.12"
            java_version: "17"
            port: 15002
            test_data_dir: ${{ github.workspace }}/crates/teckel-spark/testdata
            experimental: false
          - backend: spark
            spark_version: 3.5.4
            scala_binary: "2.12"
            java_version: "17"
            port: 15002
            test_data_dir: ${{ github.workspace }}/crates/teckel-spark/testdata
            experimental: false
          - backend: spark
            spark_version: 4.0.0
            scala_binary: "2.13"
            java_version: "17"
            port: 15002
            test_data_dir: ${{ github.workspace }}/crates/teckel-spark/testdata
            experimental: true
          - backend: sail
            port: 50051
            test_data_dir: ${{ github.workspace }}/crates/teckel-spark/testdata
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - name: Checkout teckel-rs (path dependency)
        uses: actions/checkout@v4
        with:
          repository: eff3ct0/teckel-rs
          path: _teckel-rs

      - name: Symlink teckel-rs to expected path
        run: ln -s "$GITHUB_WORKSPACE/_teckel-rs" "$GITHUB_WORKSPACE/../teckel-rs"

      # ── Backend: Spark (binary, no Docker) ─────────────────────
      - name: Setup Java (for Spark)
        if: matrix.backend == 'spark'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}

      - name: Install and start Spark Connect server
        if: matrix.backend == 'spark'
        env:
          SPARK_VERSION: ${{ matrix.spark_version }}
          SCALA_BINARY: ${{ matrix.scala_binary }}
          SPARK_HADOOP: hadoop3
        run: |
          if [ "$SCALA_BINARY" = "2.13" ]; then
            ARCHIVE="spark-${SPARK_VERSION}-bin-${SPARK_HADOOP}-scala2.13.tgz"
          else
            ARCHIVE="spark-${SPARK_VERSION}-bin-${SPARK_HADOOP}.tgz"
          fi
          curl -fsSL "https://archive.apache.org/dist/spark/spark-${SPARK_VERSION}/${ARCHIVE}" \
            -o /tmp/spark.tgz
          mkdir -p "$HOME/spark"
          tar -xzf /tmp/spark.tgz -C "$HOME/spark" --strip-components=1
          echo "SPARK_HOME=$HOME/spark" >> "$GITHUB_ENV"
          export SPARK_HOME="$HOME/spark"
          export SPARK_NO_DAEMONIZE=0
          "$SPARK_HOME/sbin/start-connect-server.sh" \
            --master 'local[*]' \
            --packages "org.apache.spark:spark-connect_${SCALA_BINARY}:${SPARK_VERSION}"

      # ── Backend: Sail (pip, no Docker) ─────────────────────────
      - name: Setup Python
        if: matrix.backend == 'sail'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and start Sail Spark Connect server
        if: matrix.backend == 'sail'
        run: |
          pip install pysail==0.6.0
          nohup sail spark server --port ${{ matrix.port }} \
            > "$GITHUB_WORKSPACE/sail.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/sail.pid"

      - name: Wait for Spark Connect to be ready
        run: |
          echo "Waiting for ${{ matrix.backend }} on port ${{ matrix.port }}..."
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 ${{ matrix.port }} 2>/dev/null; then
              echo "${{ matrix.backend }} is ready after ~$((i * 5))s"
              exit 0
            fi
            echo "  attempt $i/30..."
            sleep 5
          done
          echo "ERROR: ${{ matrix.backend }} did not start within 150s"
          exit 1

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Configure Git for private dependencies
        run: |
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Run integration tests
        env:
          SPARK_CONNECT_URL: "sc://127.0.0.1:${{ matrix.port }}/"
          TEST_DATA_DIR: ${{ matrix.test_data_dir }}
          RUST_LOG: info
        run: cargo test -p teckel-spark --features integration -- --nocapture

      - name: Collect Spark logs on failure
        if: failure() && matrix.backend == 'spark'
        run: |
          if [ -d "$SPARK_HOME/logs" ]; then
            tail -n +1 "$SPARK_HOME"/logs/* || true
          fi

      - name: Collect Sail logs on failure
        if: failure() && matrix.backend == 'sail'
        run: cat "$GITHUB_WORKSPACE/sail.log" || true

      - name: Stop Spark server
        if: always() && matrix.backend == 'spark'
        run: |
          if [ -n "$SPARK_HOME" ] && [ -x "$SPARK_HOME/sbin/stop-connect-server.sh" ]; then
            "$SPARK_HOME/sbin/stop-connect-server.sh" || true
          fi

      - name: Stop Sail server
        if: always() && matrix.backend == 'sail'
        run: |
          if [ -f "$GITHUB_WORKSPACE/sail.pid" ]; then
            kill "$(cat "$GITHUB_WORKSPACE/sail.pid")" || true
          fi
