syntax = "proto3";
package teckel.v1;

// Teckel Pipeline Execution Service — Spark Connect-style gRPC protocol.
//
// The client creates a session, submits individual operations (read, apply, write),
// and the worker maintains a DataFrame cache. This allows the client-side executor
// to drive the DAG while the heavy computation runs on the worker.

service PipelineService {
  // Create a new execution session on the worker.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);

  // Close a session and release all resources.
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);

  // Read an input source → returns a DataFrame handle.
  rpc ReadInput(ReadInputRequest) returns (DataFrameResponse);

  // Apply a transformation → returns a DataFrame handle.
  rpc ApplyTransform(ApplyTransformRequest) returns (DataFrameResponse);

  // Write a DataFrame to an output destination.
  rpc WriteOutput(WriteOutputRequest) returns (WriteOutputResponse);

  // Submit a full pipeline for execution (alternative to per-op mode).
  rpc ExecutePipeline(ExecutePipelineRequest) returns (ExecutePipelineResponse);

  // Get the status of a running pipeline.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // Cancel a running pipeline.
  rpc CancelPipeline(CancelPipelineRequest) returns (CancelPipelineResponse);
}

// --- Session management ---

message CreateSessionRequest {
  string backend = 1;  // "datafusion", "polars", etc.
}

message CreateSessionResponse {
  string session_id = 1;
}

message CloseSessionRequest {
  string session_id = 1;
}

message CloseSessionResponse {}

// --- Per-operation mode (Spark Connect-style) ---

message ReadInputRequest {
  string session_id = 1;
  string asset_name = 2;
  string format = 3;
  string path = 4;
  map<string, string> options = 5;
}

message DataFrameResponse {
  string session_id = 1;
  string handle_id = 2;  // Opaque reference to a DataFrame on the worker.
  int64 row_count = 3;   // Approximate row count (-1 if unknown).
}

message ApplyTransformRequest {
  string session_id = 1;
  string asset_name = 2;
  // The full Source serialized as JSON. The worker deserializes and applies.
  string source_json = 3;
  // Map of input handle IDs (asset_name → handle_id from previous ops).
  map<string, string> input_handles = 4;
}

message WriteOutputRequest {
  string session_id = 1;
  string handle_id = 2;
  string format = 3;
  string path = 4;
  string mode = 5;
  map<string, string> options = 6;
}

message WriteOutputResponse {
  int64 rows_written = 1;
}

// --- Full pipeline mode ---

message ExecutePipelineRequest {
  string session_id = 1;
  // The full pipeline YAML (worker parses and executes).
  string yaml = 2;
  map<string, string> variables = 3;
}

message ExecutePipelineResponse {
  string job_id = 1;
  string status = 2;  // "completed", "failed"
  string error = 3;   // Empty on success.
  int64 duration_ms = 4;
}

// --- Status and cancellation ---

message GetStatusRequest {
  string job_id = 1;
}

message GetStatusResponse {
  string job_id = 1;
  string status = 2;  // "running", "completed", "failed", "cancelled"
  string error = 3;
  int64 duration_ms = 4;
}

message CancelPipelineRequest {
  string job_id = 1;
}

message CancelPipelineResponse {
  bool cancelled = 1;
}
