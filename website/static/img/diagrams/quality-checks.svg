<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" fill="none">
  <style>
    text { font-family: 'Inter', 'Geist', system-ui, sans-serif; }
    .title { font-size: 13px; fill: #09090b; font-weight: 600; }
    .cat { font-size: 10px; fill: #71717a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .mono { font-family: 'Geist Mono', 'JetBrains Mono', monospace; font-size: 10px; fill: #52525b; }
    .sev-err { fill: #b91c1c; font-weight: 600; } .sev-warn { fill: #b45309; font-weight: 600; } .sev-info { fill: #0369a1; font-weight: 600; }
    .box { stroke: #e4e4e7; stroke-width: 1; rx: 6; fill: white; }
    .box-accent { stroke: #d4d4d8; stroke-width: 1; rx: 6; fill: #fafafa; }
    .arrow { stroke: #a1a1aa; stroke-width: 1.2; marker-end: url(#qa); }
    @media (prefers-color-scheme: dark) {
      .title { fill: #fafafa; } .cat { fill: #a1a1aa; } .mono { fill: #a1a1aa; }
      .sev-err { fill: #f87171; } .sev-warn { fill: #fbbf24; } .sev-info { fill: #38bdf8; }
      .box { stroke: #27272a; fill: #18181b; } .box-accent { stroke: #3f3f46; fill: #27272a; }
      .arrow { stroke: #52525b; }
    }
  </style>
  <defs>
    <marker id="qa" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#a1a1aa" stroke-width="1"/></marker>
  </defs>

  <!-- Pipeline execution -->
  <rect x="10" y="120" width="100" height="40" class="box-accent"/>
  <text x="60" y="145" text-anchor="middle" class="title">Pipeline</text>
  <line x1="110" y1="140" x2="150" y2="140" class="arrow"/>

  <!-- Quality runner -->
  <rect x="150" y="100" width="120" height="80" class="box"/>
  <text x="210" y="125" text-anchor="middle" class="title">Quality Runner</text>
  <text x="210" y="142" text-anchor="middle" class="mono">per-suite execution</text>
  <text x="210" y="158" text-anchor="middle" class="mono">severity escalation</text>
  <line x1="270" y1="140" x2="310" y2="140" class="arrow"/>

  <!-- Check types grid -->
  <rect x="310" y="15" width="440" height="270" rx="10" stroke="#e4e4e7" stroke-width="1" fill="none"/>
  <text x="530" y="38" text-anchor="middle" class="cat">10 Check Types</text>

  <!-- Row 1 -->
  <rect x="325" y="50" width="130" height="30" class="box"/><text x="390" y="70" text-anchor="middle" class="mono">Schema</text>
  <rect x="465" y="50" width="130" height="30" class="box"/><text x="530" y="70" text-anchor="middle" class="mono">Completeness</text>
  <rect x="605" y="50" width="130" height="30" class="box"/><text x="670" y="70" text-anchor="middle" class="mono">Uniqueness</text>

  <!-- Row 2 -->
  <rect x="325" y="90" width="130" height="30" class="box"/><text x="390" y="110" text-anchor="middle" class="mono">Validity</text>
  <rect x="465" y="90" width="130" height="30" class="box"/><text x="530" y="110" text-anchor="middle" class="mono">Statistical</text>
  <rect x="605" y="90" width="130" height="30" class="box"/><text x="670" y="110" text-anchor="middle" class="mono">Volume</text>

  <!-- Row 3 -->
  <rect x="325" y="130" width="130" height="30" class="box"/><text x="390" y="150" text-anchor="middle" class="mono">Freshness</text>
  <rect x="465" y="130" width="130" height="30" class="box"/><text x="530" y="150" text-anchor="middle" class="mono">Referential</text>
  <rect x="605" y="130" width="130" height="30" class="box"/><text x="670" y="150" text-anchor="middle" class="mono">CrossColumn</text>

  <!-- Row 4 -->
  <rect x="325" y="170" width="130" height="30" class="box"/><text x="390" y="190" text-anchor="middle" class="mono">Custom</text>

  <!-- Severity -->
  <text x="400" y="225" text-anchor="middle" class="cat">Severity Levels</text>
  <rect x="340" y="237" width="70" height="24" rx="12" stroke="#fecaca" stroke-width="1" fill="#fef2f2"/>
  <text x="375" y="254" text-anchor="middle" class="sev-err">Error</text>
  <rect x="425" y="237" width="70" height="24" rx="12" stroke="#fde68a" stroke-width="1" fill="#fffbeb"/>
  <text x="460" y="254" text-anchor="middle" class="sev-warn">Warn</text>
  <rect x="510" y="237" width="70" height="24" rx="12" stroke="#bae6fd" stroke-width="1" fill="#f0f9ff"/>
  <text x="545" y="254" text-anchor="middle" class="sev-info">Info</text>
</svg>
